# ============================================================
# THE Ä-TEAM — netlify.toml
# Optimiert nach yourIT Praxisleitfaden Website-Qualität 2026
# ============================================================

# ── Security-Header (Stufe 2 des Leitfadens) ──────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Verhindert Clickjacking
    X-Frame-Options = "DENY"
    # Verhindert MIME-Sniffing
    X-Content-Type-Options = "nosniff"
    # Kein Referrer bei Cross-Origin
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Gerätefunktionen einschränken
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # CSP: kein unsafe-inline, nur eigene Domain + keine externen CDNs
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:; upgrade-insecure-requests; block-all-mixed-content"
    # HSTS – HTTPS erzwingen (1 Jahr)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Permitted-Cross-Domain-Policies = "none"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# ── Statische Assets langfristig cachen ───────────────────
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Redirects ─────────────────────────────────────────────
